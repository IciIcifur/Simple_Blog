version: '3.8'
services:
  web:
    build: .
    command: gunicorn simpleBlog.wsgi:application --bind 0.0.0.0:6000
    expose:
      - 6000
    container_name: backend
    environment:
      production: True
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    container_name: frontend
    depends_on:
      - web